name: Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/rules/**/*.md'

  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/rules/**/*.md'

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: docs

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install packages
        run: bun install --frozen-lockfile

      - name: Sync rule docs
        run: bun run sync

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Build
        run: bun run build
